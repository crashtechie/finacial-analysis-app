name: Security Scanning

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  schedule:
    # Run weekly security scans on Mondays at 9am UTC
    - cron: "0 9 * * 1"

jobs:
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  bandit-scan:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit security scan
        working-directory: app/backend
        run: |
          bandit -r api/ -f sarif -o bandit-results.sarif -ll || true

      - name: Upload Bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: app/backend/bandit-results.sarif
          category: bandit

      - name: Run Bandit with strict mode (fail on issues)
        working-directory: app/backend
        run: |
          bandit -r api/ -ll -f screen

      - name: Display Bandit summary
        if: always()
        working-directory: app/backend
        run: |
          echo "## Bandit Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          bandit -r api/ -f txt || true >> $GITHUB_STEP_SUMMARY

  npm-audit:
    name: npm Audit (Frontend Dependencies)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Run npm audit
        working-directory: app/frontend
        run: |
          echo "## npm Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate || true
          npm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY || true

      - name: Check for critical vulnerabilities
        working-directory: app/frontend
        run: |
          # Fail only on critical/high vulnerabilities
          npm audit --audit-level=high

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: true
