name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
  pull_request:
    branches:
      - develop
      - main

jobs:
  backend-tests:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('app/backend/pyproject.toml', 'app/backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        working-directory: app/backend
        run: uv sync --extra dev

      - name: Run database migrations
        working-directory: app/backend
        run: uv run python manage.py migrate

      - name: Load fixture data
        working-directory: app/backend
        run: uv run python manage.py loaddata api/fixtures/categories.json

      - name: Run tests with coverage
        working-directory: app/backend
        run: |
          uv run pytest --cov=api --cov-report=xml --cov-report=term --cov-fail-under=80 api/tests.py api/tests_coverage.py api/tests_edge_cases.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/backend/coverage.xml
          retention-days: 30

      - name: Display coverage summary
        working-directory: app/backend
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          uv run pytest --cov=api --cov-report=term api/tests.py api/tests_coverage.py api/tests_edge_cases.py | tail -n 20 >> $GITHUB_STEP_SUMMARY

  backend-lint:
    name: Backend Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('app/backend/pyproject.toml', 'app/backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        working-directory: app/backend
        run: uv sync --extra dev

      - name: Check code formatting with Black
        working-directory: app/backend
        run: uv run black --check api/

      - name: Run Flake8 linting
        working-directory: app/backend
        run: uv run flake8 api/

      - name: Check import sorting with isort
        working-directory: app/backend
        run: uv run isort api/ --check-only

  frontend-quality:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Run TypeScript type checking
        working-directory: app/frontend
        run: npm run type-check

      - name: Run ESLint
        working-directory: app/frontend
        run: npm run lint

      - name: Build production bundle
        working-directory: app/frontend
        run: npm run build

      # Frontend tests will be added here once test files are implemented
      # - name: Run frontend tests
      #   working-directory: app/frontend
      #   run: npm run test
