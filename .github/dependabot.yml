version: 2

updates:
  # Python dependencies (backend)
  - package-ecosystem: "pip"
    directory: "/app/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    target-branch: "develop"
    open-pull-requests-limit: 5
    groups:
      django-ecosystem:
        patterns:
          - "django*"
          - "djangorestframework*"
      dev-tools:
        patterns:
          - "black"
          - "flake8"
          - "isort"
          - "pytest*"
      data-processing:
        patterns:
          - "pandas"
          - "python-dateutil"
    labels:
      - "dependencies"
      - "backend"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"

  # npm dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/app/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    target-branch: "develop"
    open-pull-requests-limit: 5
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      build-tools:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "typescript"
      testing-tools:
        patterns:
          - "vitest"
          - "@testing-library/*"
      linting-tools:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
    labels:
      - "dependencies"
      - "frontend"
      - "npm"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    target-branch: "develop"
    labels:
      - "dependencies"
      - "ci"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
